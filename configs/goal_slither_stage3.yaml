# Slither.io fine-tune Stage 3 (2026-06-15) — curriculum warm-start.
#
# Resumes the rebased champion (saved_snakes/best_apex_rebased_stage3.pth): same
# weights as best_apex.pth, but its locked actor-geometry metadata was rewritten
# to 8 snakes / board_scale 0.6 so this harder, benchmark-aligned curriculum is
# allowed to resume. The genuinely-critical invariants are unchanged from the
# champion: gamma=0.99, n_step=3, hidden=512, input=58, output=6, reward contract.
#
# Why this differs from Stage 2 (which overfit + collapsed):
#   - Bigger actor arena (board_scale 0.35 -> 0.6) closes the train/test gap to
#     the full-board benchmark.
#   - More opponents (6 -> 8) keeps replay terminal-rich at the larger scale.
#   - Exploration RESTORED (epsilon_base 0.40, not 0.25) — low exploration was a
#     prime cause of the Stage 2 collapse.
#   - Original LR (0.00025) for real adaptation to the new distribution.

game:
  width: 1450
  height: 830
  num_snakes: 8
  initial_food: 250
  max_food: 300
  max_frames: 6000
  frame_rate: 1
  max_length: 150

network:
  input_size: 58
  hidden_size: 512
  output_size: 6
  use_gru: false

apex:
  # --- must match the rebased checkpoint's recorded geometry ---
  actor_env_num_snakes: 8
  actor_board_scale: 0.6
  actor_food_multiplier: 0.6
  gamma: 0.99
  n_step: 3

  # --- Stage 3 levers ---
  num_actors: 12
  actor_update_freq: 400
  epsilon_base: 0.40            # restored exploration (Stage 2 cut this and collapsed)
  epsilon_alpha: 7.0
  batch_size: 256
  buffer_size: 300000
  min_buffer_size: 20000
  target_update_freq: 2500
  learning_rate: 0.00025        # original LR for genuine adaptation to bigger arena

  priority_alpha: 0.6
  priority_beta_start: 0.4
  priority_beta_end: 1.0
  priority_epsilon: 0.000001

  use_compile: false
  pin_memory: false
